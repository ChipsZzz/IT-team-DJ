{% extends "base.html" %}

{% block title %}Login | UniTrade{% endblock %}

{% block content %}
  <h1>Login</h1>
  <p class="muted">Log in to manage your items and comments.</p>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Log in</button>
  </form>

  <p style="margin-top: 18px;">
    Don’t have an account?
    <a href="{% url 'register' %}">Register</a>
  </p>
{% endblock %}
