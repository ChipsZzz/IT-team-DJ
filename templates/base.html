<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>UniTrade</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<style>

body{
background:#f5f7fb;
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

.card-hover{
transition:all 0.2s ease;
cursor:pointer;
border:none;
border-radius:12px;
overflow:hidden;
}

.card-hover:hover{
transform:translateY(-6px);
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.market-img{
height:220px;
object-fit:cover;
}

.price-tag{
font-weight:600;
font-size:18px;
color:#2563eb;
}

.seller-text{
font-size:13px;
color:#6b7280;
}

.navbar-brand{
font-weight:700;
font-size:20px;
}

</style>

</head>


<body>


<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">

<div class="container">

<a class="navbar-brand" href="/">
🛒 UniTrade
</a>


<div class="d-flex align-items-center">

<a class="btn btn-outline-primary me-2" href="/items/">
🏪 Marketplace
</a>


{% if user.is_authenticated %}

<a class="btn btn-primary me-2" href="/items/create/">
➕ Sell Item
</a>

<a class="btn btn-outline-secondary me-2" href="/items/my/">
📦 My Items
</a>

<a class="btn btn-outline-dark me-2" href="/cart/">
🛒 Cart
{% if cart_count > 0 %}
<span class="badge bg-danger">
{{ cart_count }}
</span>
{% endif %}
</a>

<a class="btn btn-outline-dark me-2" href="/account/">
👤 My Account
</a>

<a class="btn btn-outline-dark me-2" href="/account/address/">
📍 Address
</a>

<form action="/accounts/logout/" method="post" style="display:inline;">
{% csrf_token %}
<button type="submit" class="btn btn-outline-danger me-2">
🚪 Logout
</button>
</form>

<span class="text-muted">
👋 Hi, {{ user.username }}
</span>

{% else %}

<a class="btn btn-outline-secondary me-2" href="/accounts/login/">
🔐 Login
</a>

<a class="btn btn-primary" href="/accounts/register/">
📝 Register
</a>

{% endif %}

</div>

</div>

</nav>



<div class="container">

{% block content %}

{% endblock %}

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
