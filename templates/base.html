<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>UniTrade</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<style>

body{
background:#f5f7fb;
}

.card-hover:hover{
transform:translateY(-4px);
transition:0.2s;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
cursor:pointer;
}

.navbar-brand{
font-weight:700;
}

</style>

</head>


<body>


<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">

<div class="container">

<a class="navbar-brand" href="/">
🛒 UniTrade
</a>


<div class="d-flex align-items-center">

<a class="btn btn-outline-primary me-2" href="/items/">
Marketplace
</a>


{% if user.is_authenticated %}

<a class="btn btn-primary me-2" href="/items/create/">
Sell Item
</a>

<a class="btn btn-outline-secondary me-2" href="/items/my/">
My Items
</a>

<form action="/accounts/logout/" method="post" style="display:inline;">
{% csrf_token %}
<button type="submit" class="btn btn-outline-danger me-2">
Logout
</button>
</form>

<span class="text-muted">
Hi, {{ user.username }}
</span>

{% else %}

<a class="btn btn-outline-secondary me-2" href="/accounts/login/">
Login
</a>

<a class="btn btn-primary" href="/accounts/register/">
Register
</a>

{% endif %}

</div>

</div>

</nav>



<div class="container">

{% block content %}

{% endblock %}

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
