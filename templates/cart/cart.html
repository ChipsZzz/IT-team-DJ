{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">🛒 My Cart</h2>

{% if cart_items %}

<table class="table">

<tr>
<th>Item</th>
<th>Price</th>
<th></th>
</tr>

{% for cart in cart_items %}

<tr>

<td>{{ cart.item.title }}</td>

<td>£{{ cart.item.price }}</td>

<td>

<a
href="/cart/remove/{{ cart.id }}/"
class="btn btn-danger btn-sm"
>

Remove

</a>

</td>

</tr>

{% endfor %}

</table>

<h4>Total: £{{ total }}</h4>

{% else %}

<p>Your cart is empty.</p>

{% endif %}

{% endblock %}
