{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">🛒 My Cart</h2>

{% if cart_items %}

<form method="POST" action="/cart/checkout/">
{% csrf_token %}

<table class="table">

<tr>
<th>Select</th>
<th>Item</th>
<th>Price</th>
<th></th>
</tr>

{% for cart in cart_items %}

<tr>

<td>
<input type="checkbox" name="selected_items" value="{{ cart.id }}">
</td>

<td>{{ cart.item.title }}</td>

<td>£{{ cart.item.price }}</td>

<td>
<a href="/cart/remove/{{ cart.id }}/" class="btn btn-danger btn-sm">
Remove
</a>
</td>

</tr>

{% endfor %}

</table>

<h4>Total: £{{ total }}</h4>

<button type="submit" class="btn btn-success mt-3">
    ✅ Checkout Selected
</button>

</form>

{% else %}

<p>Your cart is empty.</p>

{% endif %}

{% endblock %}
