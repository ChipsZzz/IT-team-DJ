{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">📍 My Address</h2>

<div class="card p-4 shadow-sm">

<form method="post">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">City</label>

<input
type="text"
name="city"
class="form-control"
value="{{ address.city }}"
>

</div>

<div class="mb-3">

<label class="form-label">Postcode</label>

<input
type="text"
name="postcode"
class="form-control"
value="{{ address.postcode }}"
>

</div>

<div class="mb-3">

<label class="form-label">Address</label>

<textarea
name="address"
class="form-control"
>{{ address.address_line }}</textarea>

</div>

<button class="btn btn-primary">
Save Address
</button>

</form>

</div>

{% endblock %}
