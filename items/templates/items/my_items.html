{% extends "base.html" %}

{% block content %}

<h3 class="mb-4">My Items</h3>

<div class="row">

{% for item in items %}

<div class="col-md-4 mb-4">

<a href="/items/{{ item.id }}/" style="text-decoration:none;color:inherit">

<div class="card item-card">

{% if item.image %} <img src="{{ item.image.url }}" class="card-img-top" style="height:200px;object-fit:cover;">
{% endif %}

<div class="card-body">

<h5>{{ item.title }}</h5>

<p class="text-success fw-bold">
£{{ item.price }}
</p>

</div>

</div>

</a>

</div>

{% empty %}

<p>No items yet.</p>

{% endfor %}

</div>

{% endblock %}
