{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">

❤️ My Favourite Items

</h2>

<div class="row">

{% for item in items %}

<div class="col-md-4 mb-4">

<div class="card shadow-sm">

{% if item.image %}

<img src="{{ item.image.url }}"
class="card-img-top"
style="height:200px;object-fit:cover">

{% endif %}

<div class="card-body">

<h5>{{ item.title }}</h5>

<p>£{{ item.price }}</p>

<a href="/items/{{ item.id }}/"
class="btn btn-primary">

View Item

</a>

</div>

</div>

</div>

{% empty %}

<p>No favourite items yet.</p>

{% endfor %}

</div>

{% endblock %}
